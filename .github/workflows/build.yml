name: Build

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: all-features
            cargo_args: --workspace --release --all-features
          - name: default
            cargo_args: --workspace --release
          - name: minimal
            cargo_args: --workspace --release --no-default-features

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Cairo/Pango (build deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango1.0-dev libcairo2-dev libxkbcommon-dev

      - name: Build cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      - name: Build (${{ matrix.name }})
        run: cargo build ${{ matrix.cargo_args }}
